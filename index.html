<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bangle Championship 2026</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Background -->

    <div class="background"></div>

    <!-- Main Container -->

    <div class="container">

        <!-- Home Screen -->

        <section id="home-screen" class="screen active">

            <div class="trophy">
                🏆
            </div>

            <h1 id="title">
                Bangle Championship
            </h1>

            <p class="subtitle">
                International Bangle Federation™
            </p>

            <p class="description">
                One Mission.
                <br>
                Find the Ultimate Champion.
            </p>

            <button id="startBtn" class="primary-btn">
                ⚽ Kick Off
            </button>

        </section>



        <!-- Match Screen -->

        <section id="match-screen" class="screen">

            <h2 id="roundTitle">
                Quarter Final
            </h2>

            <div class="match-card">

                <button class="color-btn" id="option1">

                    <span class="emoji" id="emoji1">💚</span>

                    <span id="text1">
                        Emerald Green
                    </span>

                </button>

                <div class="vs">

                    VS

                </div>

                <button class="color-btn" id="option2">

                    <span class="emoji" id="emoji2">❤️</span>

                    <span id="text2">
                        Ruby Red
                    </span>

                </button>

            </div>

        </section>



        <!-- Commentary Screen -->

        <section id="commentary-screen" class="screen">

            <h2>
                ⚽ Full Time!
            </h2>

            <p id="commentaryText">

                What a Match!

            </p>

            <button id="nextBtn" class="primary-btn">

                Next Match ➜

            </button>

        </section>



        <!-- Winner Screen -->

        <section id="winner-screen" class="screen">

            <div class="winner-trophy">

                🏆

            </div>

            <h2>

                Champion

            </h2>

            <h1 id="winnerName">

                Emerald Green

            </h1>

            <div id="confetti"></div>

            <p class="ending">

                The committee thanks you for participating.

                <br><br>

                Your decision has been recorded.

                😌

            </p>

            <button id="restartBtn" class="primary-btn">

                Play Again

            </button>

        </section>



    </div>



    <script src="script.js"></script>

</body>

</html>
